<div class="login-wrap">
  <div class="login-card">
    @if (confirmationPending()) {
      <p class="confirmation-message">Check your email to confirm your account.</p>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <h2>Create Account</h2>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" formControlName="password" />
        </div>

        @if (errorMessages().length > 0) {
          @for (errorMessage of errorMessages(); track $index) {
            <p class="error">{{ errorMessage }}</p>
          }
        }

        <button class="btn-submit" type="submit" [disabled]="form.invalid || isLoading()">
          {{ isLoading() ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <button class="btn-cancel" type="button" (click)="cancel()">Cancel</button>
    }
  </div>
</div>
