    @let menuOpen1 = menuOpen();
    <div class="ctx-menu" [class.open]="menuOpen1"
         [style.left.px]="menuX()" [style.top.px]="menuY()">

     <div class="ctx-item ctx-has-sub">
       Quick Plant <span class="ctx-arrow">▶</span>
       <div class="ctx-submenu">
         <div class="ctx-item ctx-plant" (click)="doSelectQuickPickPlant('corn')">
           <span class="ctx-dot" [style.background]="quickPickPlants[0].color"></span> Corn
         </div>
         <div class="ctx-item ctx-plant" (click)="doSelectQuickPickPlant('cucumber')">
           <span class="ctx-dot" [style.background]="quickPickPlants[1].color"></span> Cucumbers
         </div>
         <div class="ctx-item ctx-plant" (click)="doSelectQuickPickPlant('bean')">
           <span class="ctx-dot" [style.background]="quickPickPlants[2].color"></span> Green Beans
         </div>
         <div class="ctx-item ctx-plant" (click)="doSelectQuickPickPlant('tomato')">
           <span class="ctx-dot" [style.background]="quickPickPlants[3].color"></span> Tomatoes
         </div>
       </div>
     </div>
     <div class="ctx-divider"></div>
    <div class="ctx-item" (click)="doExportPNG()">Export PNG</div>
     <div class="ctx-item" (click)="doExportPDF()">Export PDF</div>
   </div>
