
<div class="toolbar" id="toolbar">
  @for (btn of toolbarPlants; track btn.key) {
    <button class="tool-btn"
            [class.active]="activePlantKey() === btn.key"
            (click)="doSelectPlant(btn.key)">
      <span class="swatch" [style.background]="btn.color"></span> {{ btn.label }}
    </button>
  }


</div>
