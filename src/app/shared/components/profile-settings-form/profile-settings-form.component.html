<form [formGroup]="form" (ngSubmit)="onSubmit()">

  <div class="field">
    <label for="display_name">Display Name</label>
    <input id="display_name" type="text" formControlName="display_name" />
  </div>

  <div class="field">
    <label for="preferred_units">Preferred Units</label>
    <select id="preferred_units" formControlName="preferred_units">
      <option value="feet">Feet</option>
      <option value="meters">Meters</option>
    </select>
  </div>

  <div class="field">
    <label>Temperature Scale</label>
    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" formControlName="temperature_scale" value="fahrenheit" />
        Fahrenheit (°F)
      </label>
      <label class="radio-option">
        <input type="radio" formControlName="temperature_scale" value="celsius" />
        Celsius (°C)
      </label>
    </div>
  </div>

  <div class="field">
    <label for="country">Country</label>
    <select id="country" formControlName="country">
      @for (c of countries(); track c.code) {
        <option [value]="c.code">{{ c.name }}</option>
      }
    </select>
  </div>

  @if (isUS()) {
    <div class="field">
      <label>USDA Growing Zone</label>
      <gp-typeahead [dataFn]="zoneDataFn" placeholder="Enter ZIP code" (selected)="onZoneSelected($event)" />
    </div>
  }

  <div class="field-row" formGroupName="grid_size">
    <div class="field">
      <label for="grid_width">Default Garden Width</label>
      <input id="grid_width" type="number" formControlName="width" min="1" max="500" />
    </div>
    <div class="field">
      <label for="grid_height">Default Garden Height</label>
      <input id="grid_height" type="number" formControlName="height" min="1" max="500" />
    </div>
  </div>

  <div class="field-check">
    <input id="show_quick_tips" type="checkbox" formControlName="show_quick_tips" />
    <label for="show_quick_tips">Show quick tips</label>
  </div>

  @if (errorMessages().length > 0) {
    @for (errorMessage of errorMessages(); track $index) {
      <p class="error">{{ errorMessage }}</p>
    }
  }

  @if (showSubmitButton()) {
    <button class="btn-submit" type="submit" [disabled]="form.invalid || isLoading()">
      {{ isLoading() ? 'Saving...' : submitLabel() }}
    </button>
  }

</form>
